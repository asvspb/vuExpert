services:
  frontend:
    build: .
    container_name: vuExpert-frontend
    ports:
      - "4173:4173" # localhost:4173 -> контейнер (vite preview)
    env_file:
      - .env
    environment:
      # VITE_* переменные можно добавить здесь при необходимости
      VITE_API_BASE_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: vuExpert-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-vuexpert}"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: vuExpert-redis
    ports:
      - "6379:6379" # по необходимости (для отладки/GUI)
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app_network

  postgres:
    image: postgres:15-alpine
    container_name: vuExpert-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-vuexpert}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app_network

  postgres_test:
    image: postgres:15-alpine
    container_name: vuExpert-postgres-test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: vuexpert_test
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:

volumes:
  redis_data:
  postgres_data:
