version: "3.9"

services:
  frontend:
    build: .
    container_name: vuExpert-frontend
    ports:
      - "4173:4173" # localhost:4173 -> контейнер (vite preview)
    env_file:
      - .env
    environment:
      # VITE_* переменные можно добавить здесь при необходимости
      VITE_API_BASE_URL: "http://backend:8000"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: vuExpert-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/vuexpert"
    depends_on:
      - redis
      - postgres
    volumes:
      - sqlite_data:/app/data

  redis:
    image: redis:7-alpine
    container_name: vuExpert-redis
    ports:
      - "6379:6379" # по необходимости (для отладки/GUI)
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    container_name: vuExpert-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vuexpert
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:15-alpine
    container_name: vuExpert-postgres-test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: vuexpert_test
    ports:
      - "5433:5432"

volumes:
  redis_data:
  sqlite_data:
  postgres_data:
